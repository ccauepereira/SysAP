openapi: 3.1.1
info:
  title: API SysAP
  version: 0.2.0
  description: >-
    Contrato HTTP do SysAP. Saude e prontidao estao implementadas; a superficie
    versionada de identidade descreve o contrato planejado para a Fase 2 e nao
    representa funcionalidade disponivel nesta subfase documental.
servers:
  - url: http://127.0.0.1:8080
    description: API local em loopback
security:
  - BearerAccessToken: []
tags:
  - name: Sistema
    description: Estado tecnico do processo e de suas dependencias.
  - name: Convites de atleta
    description: Pre-cadastro protegido e ciclo de ativacao de atletas.
  - name: Autenticacao
    description: Autenticacao, sessao, MFA e recuperacao sem cadastro publico.
  - name: Identidade
    description: Identidade atual e administracao protegida de acesso.
paths:
  /healthz:
    get:
      operationId: getHealth
      tags:
        - Sistema
      summary: Consultar saude do processo
      description: >-
        Confirma que o processo HTTP esta ativo sem consultar PostgreSQL ou
        qualquer outra dependencia externa.
      security: []
      responses:
        "200":
          description: Processo da API em execucao.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                healthy:
                  summary: Processo saudavel
                  value:
                    status: ok
                    service: sysap-api
  /readyz:
    get:
      operationId: getReadiness
      tags:
        - Sistema
      summary: Consultar prontidao da API
      description: >-
        Verifica o PostgreSQL com timeout curto. A API continua saudavel quando
        o banco esta indisponivel, mas este endpoint responde 503.
      security: []
      responses:
        "200":
          description: API pronta e PostgreSQL acessivel.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
              examples:
                ready:
                  summary: Banco disponivel
                  value:
                    status: ready
                    service: sysap-api
                    checks:
                      database: up
        "503":
          description: API ativa, mas ainda nao pronta.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotReadyResponse"
              examples:
                databaseUnavailable:
                  summary: Banco indisponivel
                  value:
                    error:
                      code: service_not_ready
                      message: service is not ready
                      request_id: 0123456789abcdef0123456789abcdef
  /v1/athlete-invitations:
    post:
      operationId: createAthleteInvitation
      tags:
        - Convites de atleta
      summary: Pre-cadastrar atleta e iniciar ativacao
      description: >-
        Cria um convite na organizacao selecionada por X-Organization-ID. O
        header e apenas contexto nao confiavel: a API exige membership ativa e
        deriva papel/escopo do banco. Organizacao, papel, estado e identidade
        tecnica nunca sao aceitos no corpo. Uma repeticao segura nao cria outra
        identidade nem solicita outro SMS.
      x-sysap-implementation-status: planned
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/OrganizationContext"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAthleteInvitationRequest"
            examples:
              fictionalAthlete:
                summary: Atleta e telefone reservados para documentacao
                value:
                  full_name: Atleta Exemplo
                  birth_date: "2010-01-15"
                  phone: "+12025550123"
      responses:
        "201":
          description: Convite criado e fluxo de provisionamento iniciado.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
            Location:
              $ref: "#/components/headers/InvitationLocation"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AthleteInvitationResponse"
              examples:
                pendingProvisioning:
                  summary: Convite ficticio aguardando provisionamento
                  value:
                    invitation_id: 10000000-0000-4000-8000-000000000001
                    enrollment_number: "2026000001"
                    status: pending_provisioning
                    created_at: "2026-07-22T15:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "403":
          $ref: "#/components/responses/AccessDenied"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
        "409":
          $ref: "#/components/responses/ResourceConflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/auth/athlete/activate:
    post:
      operationId: activateAthleteAccount
      tags:
        - Autenticacao
      summary: Ativar conta de atleta
      description: >-
        Verifica matricula e OTP de uma identidade previamente provisionada e
        registra a senha escolhida pelo atleta. A operacao nao cria usuarios e
        nao inicia sessao; apos o sucesso, o atleta faz login explicitamente.
        Falhas de matricula, OTP, convite ou estado usam a mesma resposta. A
        idempotencia usa desafio/estado e projecao nao secreta; senha, OTP e
        qualquer derivado nunca sao persistidos para comparar requests.
      x-sysap-implementation-status: planned
      security: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateAthleteRequest"
      responses:
        "204":
          $ref: "#/components/responses/CommandCompleted"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/InvalidCredentials"
        "409":
          $ref: "#/components/responses/ResourceConflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/auth/athlete/login:
    post:
      operationId: loginAthlete
      tags:
        - Autenticacao
      summary: Autenticar atleta por matricula
      description: >-
        Autentica com matricula e senha sem expor identidade tecnica em campo de
        negocio. A sessao criada pelo Auth fica server-side ate a checagem da
        membership e e revogada se houver negacao. A mesma resposta generica
        cobre matricula inexistente, senha incorreta, conta suspensa, convite
        invalido e vinculo encerrado.
      x-sysap-implementation-status: planned
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AthleteLoginRequest"
      responses:
        "200":
          description: Credenciais aceitas e sessao emitida.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/InvalidCredentials"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/auth/staff/login:
    post:
      operationId: loginStaff
      tags:
        - Autenticacao
      summary: Validar primeiro fator de staff
      description: >-
        Valida email e senha de owner ou trainer e devolve somente um ticket
        opaco CSPRNG, vinculado ao sujeito, sessao e finalidade, de uso unico e
        com validade de cinco minutos. A resposta indica verificacao de fator
        existente ou enrollment obrigatorio. A sessao AAL1 fica sob custodia
        server-side; nenhuma sessao utilizavel de staff e emitida antes do
        segundo fator.
      x-sysap-implementation-status: planned
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffLoginRequest"
      responses:
        "200":
          description: Primeiro fator aceito; verificacao ou enrollment TOTP necessario.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MFAChallengeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/InvalidCredentials"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/auth/staff/mfa/enroll:
    post:
      operationId: enrollStaffMFA
      tags:
        - Autenticacao
      summary: Iniciar enrollment TOTP de staff
      description: >-
        Consome um ticket de primeiro fator limitado a enrollment, cria um fator
        TOTP ainda nao verificado e seu challenge, e devolve URI de
        provisionamento e novo ticket de verificacao ligado a ambos. A URI
        contem segredo e nunca e registrada ou cacheada.
        Nao ha replay idempotente dessa resposta; em resultado ambiguo, o staff
        reinicia o login e fatores nao verificados sao reconciliados/removidos.
        Nenhuma membership staff fica ativa antes da verificacao.
      x-sysap-implementation-status: planned
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartStaffMFAEnrollmentRequest"
      responses:
        "200":
          description: Fator TOTP pendente de confirmacao pelo proprio staff.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MFAEnrollmentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/InvalidCredentials"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/auth/staff/mfa/verify:
    post:
      operationId: verifyStaffMFA
      tags:
        - Autenticacao
      summary: Concluir autenticacao TOTP de staff
      description: >-
        Consome uma unica vez o ticket opaco de fator existente ou de enrollment
        e valida um codigo TOTP na janela aceita pelo Auth. Ticket
        expirado/repetido, codigo incorreto, staff inexistente ou acesso
        suspenso produzem a mesma falha generica.
      x-sysap-implementation-status: planned
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyStaffMFARequest"
      responses:
        "200":
          description: Segundo fator aceito e sessao de staff emitida.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/InvalidCredentials"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/athlete-invitations/{invitation_id}/resend:
    parameters:
      - $ref: "#/components/parameters/InvitationID"
    post:
      operationId: resendAthleteInvitation
      tags:
        - Convites de atleta
      summary: Solicitar novo OTP de ativacao
      description: >-
        Aceita novo envio somente para convite previamente provisionado,
        visivel na organizacao e em estado compativel. A resposta nao revela
        telefone completo, fornecedor ou resultado individual da entrega.
      x-sysap-implementation-status: planned
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          $ref: "#/components/responses/CommandAccepted"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "403":
          $ref: "#/components/responses/AccessDenied"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
        "409":
          $ref: "#/components/responses/ResourceConflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/athlete-invitations/{invitation_id}:
    parameters:
      - $ref: "#/components/parameters/InvitationID"
    delete:
      operationId: cancelAthleteInvitation
      tags:
        - Convites de atleta
      summary: Cancelar convite de atleta
      description: >-
        Fecha um convite ainda cancelavel na organizacao do ator. Convites
        inexistentes e pertencentes a outra organizacao produzem a mesma
        resposta publica de recurso nao encontrado.
      x-sysap-implementation-status: planned
      responses:
        "204":
          $ref: "#/components/responses/CommandCompleted"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "403":
          $ref: "#/components/responses/AccessDenied"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
        "409":
          $ref: "#/components/responses/ResourceConflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/auth/refresh:
    post:
      operationId: refreshSession
      tags:
        - Autenticacao
      summary: Renovar sessao
      description: >-
        Troca um refresh token valido por um novo par rotacionado. O cliente
        serializa a operacao por sessao e substitui o par atomicamente; a API
        nao persiste resposta idempotente contendo tokens. O token no corpo e
        uma credencial e nunca deve ser registrado. Falhas nao informam se a
        sessao expirou, foi revogada ou reutilizada.
      x-sysap-implementation-status: planned
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshSessionRequest"
      responses:
        "200":
          description: Sessao renovada e tokens anteriores rotacionados.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/InvalidCredentials"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/auth/logout:
    post:
      operationId: logoutSession
      tags:
        - Autenticacao
      summary: Encerrar sessao atual
      description: >-
        Marca o session_id verificado como revogado no SysAP antes de solicitar
        sign-out ao Auth. Toda rota protegida consulta essa revogacao porque o
        access JWT pode verificar ate exp. O Web remove cookies no BFF e o
        mobile remove material local mesmo se a resposta remota for ambigua.
      x-sysap-implementation-status: planned
      responses:
        "204":
          $ref: "#/components/responses/CommandCompleted"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/auth/logout-all:
    post:
      operationId: logoutAllSessions
      tags:
        - Autenticacao
      summary: Encerrar todas as sessoes
      description: >-
        Grava um corte local e revoga todas as sessoes conhecidas do sujeito
        autenticado antes de solicitar sign-out global, sem aceitar usuario,
        organizacao ou papel do cliente. O primeiro sucesso retorna 204; retry
        com o mesmo bearer ja revogado pode retornar 401, que o cliente trata
        como estado terminal e ainda assim remove seu material local.
      x-sysap-implementation-status: planned
      responses:
        "204":
          $ref: "#/components/responses/CommandCompleted"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/auth/recovery/request:
    post:
      operationId: requestAthleteAccountRecovery
      tags:
        - Autenticacao
      summary: Solicitar recuperacao de atleta
      description: >-
        Aceita somente a matricula e responde de forma indistinguivel para
        conta existente, inexistente, suspensa ou encerrada. O aceite nao
        confirma envio nem revela o destino. Falhas individuais de entrega sao
        tratadas fora da resposta publica.
      x-sysap-implementation-status: planned
      security: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestAthleteRecoveryRequest"
            examples:
              fictionalEnrollment:
                summary: Matricula ficticia
                value:
                  enrollment_number: "2026000001"
      responses:
        "202":
          $ref: "#/components/responses/CommandAccepted"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/ResourceConflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/auth/recovery/confirm:
    post:
      operationId: confirmAthleteAccountRecovery
      tags:
        - Autenticacao
      summary: Confirmar recuperacao de atleta
      description: >-
        Verifica matricula e OTP, substitui a senha e encerra sessoes anteriores.
        Nao inicia nova sessao; o atleta autentica explicitamente depois. A
        idempotencia nao persiste senha, OTP ou derivados. Falhas de identidade,
        codigo ou estado compartilham a mesma resposta generica.
      x-sysap-implementation-status: planned
      security: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmAthleteRecoveryRequest"
      responses:
        "204":
          $ref: "#/components/responses/CommandCompleted"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/InvalidCredentials"
        "409":
          $ref: "#/components/responses/ResourceConflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/me:
    get:
      operationId: getCurrentIdentity
      tags:
        - Identidade
      summary: Consultar identidade atual
      description: >-
        Retorna perfil e memberships confirmadas no estado autoritativo do
        SysAP. O resultado nao expoe identificador tecnico de autenticacao,
        telefone, tokens nem claims usados como unica fonte de autorizacao.
      x-sysap-implementation-status: planned
      responses:
        "200":
          description: Identidade e vinculos atuais.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentIdentityResponse"
              examples:
                fictionalAthlete:
                  summary: Perfil ficticio de atleta
                  value:
                    profile_id: 40000000-0000-4000-8000-000000000001
                    display_name: Atleta Exemplo
                    memberships:
                      - membership_id: 20000000-0000-4000-8000-000000000001
                        organization_id: 30000000-0000-4000-8000-000000000001
                        role: athlete
                        access_status: active
                        athlete_id: 50000000-0000-4000-8000-000000000001
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "403":
          $ref: "#/components/responses/AccessDenied"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/memberships/{membership_id}/access:
    parameters:
      - $ref: "#/components/parameters/MembershipID"
    patch:
      operationId: updateMembershipAccess
      tags:
        - Identidade
      summary: Suspender ou reativar acesso
      description: >-
        Define o estado de acesso de uma membership visivel na mesma organizacao.
        Papel, organizacao e identidade tecnica nao podem ser alterados por este
        corpo. Recurso inexistente e recurso de outro tenant retornam o mesmo 404.
      x-sysap-implementation-status: planned
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMembershipAccessRequest"
            examples:
              suspendForReview:
                summary: Suspensao com razao segura
                value:
                  access_status: suspended
                  reason_code: security_review
      responses:
        "200":
          description: Estado de acesso atualizado.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembershipAccessResponse"
              examples:
                suspended:
                  summary: Membership ficticia suspensa
                  value:
                    membership_id: 20000000-0000-4000-8000-000000000001
                    access_status: suspended
                    updated_at: "2026-07-22T15:10:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "403":
          $ref: "#/components/responses/AccessDenied"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
        "409":
          $ref: "#/components/responses/ResourceConflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
components:
  securitySchemes:
    BearerAccessToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Access token de curta duracao validado pela API. O token e tratado pelo
        cliente como opaco; sub/session_id nao sao IDs de negocio. Sessao deve
        ter sido registrada pela API; papel, organizacao e acesso sao
        confirmados no estado do SysAP.
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: >-
        UUID gerado pelo cliente para tornar o comando repetivel. Comandos sem
        segredo comparam somente a projecao canonica nao secreta. Em ativacao e
        recovery, desafio/estado terminal controlam repeticao; senha, OTP/TOTP,
        token, ticket MFA e qualquer derivado nunca entram no fingerprint.
      schema:
        type: string
        format: uuid
      example: 00000000-0000-4000-8000-000000000001
    OrganizationContext:
      name: X-Organization-ID
      in: header
      required: true
      description: >-
        Organizacao selecionada pelo ator. E somente contexto nao confiavel; a
        API exige membership ativa e permissao no estado autoritativo.
      schema:
        type: string
        format: uuid
      example: 30000000-0000-4000-8000-000000000001
    InvitationID:
      name: invitation_id
      in: path
      required: true
      description: Identificador opaco do convite no SysAP.
      schema:
        type: string
        format: uuid
      example: 10000000-0000-4000-8000-000000000001
    MembershipID:
      name: membership_id
      in: path
      required: true
      description: Identificador opaco da membership no SysAP.
      schema:
        type: string
        format: uuid
      example: 20000000-0000-4000-8000-000000000001
  responses:
    CommandAccepted:
      description: Comando aceito sem confirmar existencia, destino ou entrega.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CommandAcceptedResponse"
          examples:
            accepted:
              summary: Comando aceito
              value:
                status: accepted
    CommandCompleted:
      description: Comando concluido sem corpo de resposta.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
    BadRequest:
      description: Requisicao malformada ou header invalido.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            malformedRequest:
              summary: Requisicao malformada
              value:
                error:
                  code: invalid_request
                  message: request is invalid
                  request_id: 0123456789abcdef0123456789abcdef
    InvalidCredentials:
      description: Falha generica de autenticacao sem indicar qual dado falhou.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            authenticationFailed:
              summary: Autenticacao nao concluida
              value:
                error:
                  code: authentication_failed
                  message: authentication failed
                  request_id: 0123456789abcdef0123456789abcdef
    AuthenticationRequired:
      description: Access token ausente, invalido, expirado ou revogado.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
        WWW-Authenticate:
          $ref: "#/components/headers/BearerChallenge"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            authenticationRequired:
              summary: Autenticacao necessaria
              value:
                error:
                  code: authentication_required
                  message: authentication is required
                  request_id: 0123456789abcdef0123456789abcdef
    AccessDenied:
      description: Sujeito autenticado sem acesso ativo ou permissao suficiente.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            accessDenied:
              summary: Acesso negado
              value:
                error:
                  code: access_denied
                  message: access is denied
                  request_id: 0123456789abcdef0123456789abcdef
    ResourceNotFound:
      description: >-
        Recurso inexistente ou fora da organizacao visivel, sem distinguir os
        dois casos.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            resourceNotFound:
              summary: Recurso nao encontrado
              value:
                error:
                  code: resource_not_found
                  message: resource was not found
                  request_id: 0123456789abcdef0123456789abcdef
    ResourceConflict:
      description: Estado incompativel ou chave de idempotencia reutilizada.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            resourceConflict:
              summary: Conflito de estado
              value:
                error:
                  code: resource_conflict
                  message: request conflicts with current state
                  request_id: 0123456789abcdef0123456789abcdef
    ValidationFailed:
      description: Campos invalidos sem ecoar valores sensiveis recebidos.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"
          examples:
            validationFailed:
              summary: Falha de validacao estatica
              value:
                error:
                  code: validation_failed
                  message: request validation failed
                  request_id: 0123456789abcdef0123456789abcdef
                  details:
                    - field: enrollment_number
                      reason: invalid_format
    RateLimited:
      description: Limite temporario excedido sem revelar a dimensao aplicada.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            rateLimited:
              summary: Limite temporario excedido
              value:
                error:
                  code: rate_limited
                  message: too many requests
                  request_id: 0123456789abcdef0123456789abcdef
    ServiceUnavailable:
      description: >-
        Operacao temporariamente indisponivel sem identificar dependencia ou
        fornecedor. Em fluxos antienumeracao, somente falha global usa 503.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            serviceUnavailable:
              summary: Servico temporariamente indisponivel
              value:
                error:
                  code: service_unavailable
                  message: service is temporarily unavailable
                  request_id: 0123456789abcdef0123456789abcdef
  headers:
    CacheControl:
      description: Impede cache das respostas de saude e prontidao.
      required: true
      schema:
        type: string
        const: no-store
      example: no-store
    RequestID:
      description: >-
        Identificador hexadecimal gerado pelo servidor para correlacao da
        requisicao. O caminho normal possui 32 caracteres; a contingencia pode
        produzir um valor hexadecimal maior.
      required: true
      schema:
        $ref: "#/components/schemas/RequestID"
      example: 0123456789abcdef0123456789abcdef
    NoStore:
      description: Impede armazenamento de respostas de identidade e autenticacao.
      required: true
      schema:
        type: string
        const: no-store
      example: no-store
    RetryAfter:
      description: Segundos inteiros antes de uma nova tentativa permitida.
      required: true
      schema:
        type: integer
        minimum: 1
        maximum: 86400
      example: 60
    BearerChallenge:
      description: Desafio padrao para access token bearer.
      required: true
      schema:
        type: string
        const: Bearer
      example: Bearer
    InvitationLocation:
      description: Caminho relativo do convite criado.
      required: true
      schema:
        type: string
        pattern: "^/v1/athlete-invitations/[0-9a-f-]{36}$"
      example: /v1/athlete-invitations/10000000-0000-4000-8000-000000000001
  schemas:
    RequestID:
      type: string
      pattern: "^[0-9a-f]+$"
      minLength: 32
      description: Identificador hexadecimal opaco gerado pelo servidor.
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - service
      properties:
        status:
          type: string
          const: ok
        service:
          type: string
          const: sysap-api
    ReadinessResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - service
        - checks
      properties:
        status:
          type: string
          const: ready
        service:
          type: string
          const: sysap-api
        checks:
          $ref: "#/components/schemas/ReadinessChecks"
    ReadinessChecks:
      type: object
      additionalProperties: false
      required:
        - database
      properties:
        database:
          type: string
          const: up
    NotReadyResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/NotReadyError"
    NotReadyError:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - request_id
      properties:
        code:
          type: string
          const: service_not_ready
        message:
          type: string
          const: service is not ready
        request_id:
          $ref: "#/components/schemas/RequestID"
    UUID:
      type: string
      format: uuid
      description: Identificador opaco no dominio do SysAP.
    EnrollmentNumber:
      type: string
      minLength: 10
      maxLength: 10
      pattern: "^[0-9]{10}$"
      description: Matricula publica ficticia de exatamente dez digitos.
      example: "2026000001"
    FullNameInput:
      type: string
      minLength: 2
      maxLength: 120
      description: Nome necessario ao pre-cadastro, sem uso como credencial.
      example: Atleta Exemplo
    BirthDateInput:
      type: string
      format: date
      description: >-
        Data civil de nascimento ficticia, validada para nao aceitar data
        futura. Nao e usada para gerar matricula ou credencial.
      example: "2010-01-15"
    PhoneE164Input:
      type: string
      minLength: 9
      maxLength: 16
      pattern: "^\\+[1-9][0-9]{7,14}$"
      writeOnly: true
      description: >-
        Telefone internacional recebido apenas no pre-cadastro protegido. O
        exemplo pertence a faixa reservada para documentacao.
      example: "+12025550123"
    PasswordInput:
      type: string
      minLength: 15
      maxLength: 128
      writeOnly: true
      description: >-
        Senha escolhida pelo usuario. Espacos e Unicode sao permitidos, sem
        truncamento silencioso nem regra previsivel de composicao.
    OTPInput:
      type: string
      minLength: 6
      maxLength: 6
      pattern: "^[0-9]{6}$"
      writeOnly: true
      description: OTP numerico de seis digitos, tratado como segredo de uso unico.
    TOTPInput:
      type: string
      minLength: 6
      maxLength: 6
      pattern: "^[0-9]{6}$"
      writeOnly: true
      description: Codigo TOTP numerico de seis digitos, tratado como segredo.
    StaffEmailInput:
      type: string
      format: email
      minLength: 3
      maxLength: 254
      writeOnly: true
      description: Email de login de owner ou trainer previamente provisionado.
      example: treinador@example.invalid
    RefreshTokenInput:
      type: string
      minLength: 1
      maxLength: 16384
      writeOnly: true
      description: Refresh token opaco recebido somente para renovacao.
    MFAChallengeTicketInput:
      type: string
      minLength: 43
      maxLength: 128
      pattern: "^[A-Za-z0-9_-]+$"
      writeOnly: true
      description: >-
        Ticket bearer CSPRNG de uso unico, vinculado a sujeito, sessao e
        finalidade, com validade de cinco minutos. Ticket de enrollment ainda
        nao possui fator; ticket de verificacao tambem liga fator e challenge.
        Nunca deve ser registrado.
    AccessTokenOutput:
      type: string
      minLength: 1
      maxLength: 16384
      readOnly: true
      description: Access token de curta duracao retornado somente apos autenticacao.
    RefreshTokenOutput:
      type: string
      minLength: 1
      maxLength: 16384
      readOnly: true
      description: Refresh token rotacionavel retornado somente apos autenticacao.
    MFAChallengeTicketOutput:
      type: string
      minLength: 43
      maxLength: 128
      pattern: "^[A-Za-z0-9_-]+$"
      readOnly: true
      description: >-
        Ticket bearer CSPRNG de uso unico por cinco minutos. Sempre liga sujeito,
        sessao e finalidade; fator/challenge sao ligados somente depois do
        enrollment. Nunca deve ser registrado.
    TOTPProvisioningURIOutput:
      type: string
      format: uri
      minLength: 1
      maxLength: 2048
      readOnly: true
      description: >-
        URI otpauth de enrollment que contem o segredo TOTP. E exibida somente
        ao proprio staff pelo BFF, nunca registrada, persistida ou reutilizada.
    InvitationStatus:
      type: string
      enum:
        - pending_provisioning
        - provisioning_failed
        - pending_activation
        - activation_finalizing
        - accepted
        - cancelled
        - expired
      description: Estado persistido do convite, separado do acesso da membership.
    MembershipRole:
      type: string
      enum:
        - owner
        - trainer
        - athlete
      description: Papel confirmado no estado autoritativo do SysAP.
    MembershipAccessStatus:
      type: string
      enum:
        - active
        - suspended
      description: >-
        Projecao mutavel de acesso. Membership pending_activation ou closed nao
        aparece em /me e nao pode ser alvo deste PATCH.
    CreateAthleteInvitationRequest:
      type: object
      additionalProperties: false
      required:
        - full_name
        - birth_date
        - phone
      properties:
        full_name:
          $ref: "#/components/schemas/FullNameInput"
        birth_date:
          $ref: "#/components/schemas/BirthDateInput"
        phone:
          $ref: "#/components/schemas/PhoneE164Input"
    AthleteInvitationResponse:
      type: object
      additionalProperties: false
      required:
        - invitation_id
        - enrollment_number
        - status
        - created_at
      properties:
        invitation_id:
          $ref: "#/components/schemas/UUID"
        enrollment_number:
          $ref: "#/components/schemas/EnrollmentNumber"
        status:
          $ref: "#/components/schemas/InvitationStatus"
        created_at:
          type: string
          format: date-time
          description: Instante UTC de criacao do convite.
    ActivateAthleteRequest:
      type: object
      additionalProperties: false
      required:
        - enrollment_number
        - otp
        - password
      properties:
        enrollment_number:
          $ref: "#/components/schemas/EnrollmentNumber"
        otp:
          $ref: "#/components/schemas/OTPInput"
        password:
          $ref: "#/components/schemas/PasswordInput"
    AthleteLoginRequest:
      type: object
      additionalProperties: false
      required:
        - enrollment_number
        - password
      properties:
        enrollment_number:
          $ref: "#/components/schemas/EnrollmentNumber"
        password:
          $ref: "#/components/schemas/PasswordInput"
    StaffLoginRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
      properties:
        email:
          $ref: "#/components/schemas/StaffEmailInput"
        password:
          $ref: "#/components/schemas/PasswordInput"
    MFAChallengeResponse:
      type: object
      additionalProperties: false
      required:
        - authentication_state
        - challenge_ticket
        - expires_at
      properties:
        authentication_state:
          type: string
          enum:
            - mfa_required
            - mfa_enrollment_required
          description: Proximo passo permitido pelo ticket de primeiro fator.
        challenge_ticket:
          $ref: "#/components/schemas/MFAChallengeTicketOutput"
        expires_at:
          type: string
          format: date-time
          readOnly: true
          description: Instante UTC de expiracao do ticket.
    StartStaffMFAEnrollmentRequest:
      type: object
      additionalProperties: false
      required:
        - challenge_ticket
      properties:
        challenge_ticket:
          $ref: "#/components/schemas/MFAChallengeTicketInput"
    MFAEnrollmentResponse:
      type: object
      additionalProperties: false
      required:
        - authentication_state
        - challenge_ticket
        - totp_uri
        - expires_at
      properties:
        authentication_state:
          type: string
          const: mfa_enrollment_pending
        challenge_ticket:
          $ref: "#/components/schemas/MFAChallengeTicketOutput"
        totp_uri:
          $ref: "#/components/schemas/TOTPProvisioningURIOutput"
        expires_at:
          type: string
          format: date-time
          readOnly: true
          description: Instante UTC de expiracao do ticket e da exibicao segura.
    VerifyStaffMFARequest:
      type: object
      additionalProperties: false
      required:
        - challenge_ticket
        - totp
      properties:
        challenge_ticket:
          $ref: "#/components/schemas/MFAChallengeTicketInput"
        totp:
          $ref: "#/components/schemas/TOTPInput"
    SessionResponse:
      type: object
      additionalProperties: false
      required:
        - access_token
        - refresh_token
        - token_type
        - expires_in
      properties:
        access_token:
          $ref: "#/components/schemas/AccessTokenOutput"
        refresh_token:
          $ref: "#/components/schemas/RefreshTokenOutput"
        token_type:
          type: string
          const: Bearer
          readOnly: true
        expires_in:
          type: integer
          minimum: 1
          maximum: 604800
          readOnly: true
          description: Validade do access token em segundos.
    RefreshSessionRequest:
      type: object
      additionalProperties: false
      required:
        - refresh_token
      properties:
        refresh_token:
          $ref: "#/components/schemas/RefreshTokenInput"
    RequestAthleteRecoveryRequest:
      type: object
      additionalProperties: false
      required:
        - enrollment_number
      properties:
        enrollment_number:
          $ref: "#/components/schemas/EnrollmentNumber"
    ConfirmAthleteRecoveryRequest:
      type: object
      additionalProperties: false
      required:
        - enrollment_number
        - otp
        - new_password
      properties:
        enrollment_number:
          $ref: "#/components/schemas/EnrollmentNumber"
        otp:
          $ref: "#/components/schemas/OTPInput"
        new_password:
          $ref: "#/components/schemas/PasswordInput"
    CommandAcceptedResponse:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
          const: accepted
    CurrentIdentityResponse:
      type: object
      additionalProperties: false
      required:
        - profile_id
        - display_name
        - memberships
      properties:
        profile_id:
          $ref: "#/components/schemas/UUID"
        display_name:
          type: string
          minLength: 1
          maxLength: 120
        memberships:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: "#/components/schemas/MembershipSummary"
    MembershipSummary:
      type: object
      additionalProperties: false
      required:
        - membership_id
        - organization_id
        - role
        - access_status
      properties:
        membership_id:
          $ref: "#/components/schemas/UUID"
        organization_id:
          $ref: "#/components/schemas/UUID"
        role:
          $ref: "#/components/schemas/MembershipRole"
        access_status:
          $ref: "#/components/schemas/MembershipAccessStatus"
        athlete_id:
          $ref: "#/components/schemas/UUID"
    UpdateMembershipAccessRequest:
      oneOf:
        - type: object
          additionalProperties: false
          required:
            - access_status
            - reason_code
          properties:
            access_status:
              type: string
              const: suspended
            reason_code:
              type: string
              enum:
                - security_review
                - policy_violation
                - administrative_suspension
              description: Codigo enumerado e sem dado pessoal para suspensao.
        - type: object
          additionalProperties: false
          required:
            - access_status
            - reason_code
          properties:
            access_status:
              type: string
              const: active
            reason_code:
              type: string
              const: access_restored
              description: Codigo unico permitido para reativacao.
    MembershipAccessResponse:
      type: object
      additionalProperties: false
      required:
        - membership_id
        - access_status
        - updated_at
      properties:
        membership_id:
          $ref: "#/components/schemas/UUID"
        access_status:
          $ref: "#/components/schemas/MembershipAccessStatus"
        updated_at:
          type: string
          format: date-time
          description: Instante UTC da alteracao.
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/PublicError"
    PublicError:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - request_id
      properties:
        code:
          type: string
          minLength: 3
          maxLength: 64
          pattern: "^[a-z][a-z0-9_]*$"
        message:
          type: string
          minLength: 1
          maxLength: 200
        request_id:
          $ref: "#/components/schemas/RequestID"
    ValidationErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/ValidationError"
    ValidationError:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - request_id
        - details
      properties:
        code:
          type: string
          const: validation_failed
        message:
          type: string
          const: request validation failed
        request_id:
          $ref: "#/components/schemas/RequestID"
        details:
          type: array
          minItems: 1
          maxItems: 50
          items:
            $ref: "#/components/schemas/ValidationDetail"
    ValidationDetail:
      type: object
      additionalProperties: false
      required:
        - field
        - reason
      properties:
        field:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[a-z][a-z0-9_.]*$"
        reason:
          type: string
          enum:
            - required
            - invalid_format
            - too_short
            - too_long
            - not_allowed
            - password_rejected
